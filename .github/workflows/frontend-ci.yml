name: Frontend CI

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    name: type-check / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # packageManager pin lives in frontend/, not the repo root.
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # env.ts validates these at build time via ./src/env.
          # Dummy values keep the schema check honest without real secrets.
          NEXT_PUBLIC_DIRECTUS_URL: https://api.example.com
          NEXT_PUBLIC_SITE_URL: https://example.com
