name: Frontend CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml
  push:
    branches: [main, dev]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml

defaults:
  run:
    working-directory: frontend

# Least-privilege default: this job never touches secrets (dummy build env only),
# so fork PRs can run it safely without any repository secret exposure.
permissions:
  contents: read

jobs:
  validate:
    name: type-check / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # packageManager pin lives in frontend/, not the repo root.
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-${{ hashFiles('frontend/src/**', 'frontend/public/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # env.ts validates these at build time via ./src/env.
          # Dummy values keep the schema check honest without real secrets.
          NEXT_PUBLIC_DIRECTUS_URL: https://api.example.com
          NEXT_PUBLIC_SITE_URL: https://example.com

  deploy-preview:
    name: deploy preview (Workers)
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.upload_preview.outputs.url }}
    env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Infisical login
        run: |
          echo "INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)" >> "$GITHUB_ENV"
          echo "INFISICAL_PROJECT_ID=$(python3 -c "import json;print(json.load(open('.infisical.json'))['workspaceId'])")" >> "$GITHUB_ENV"

      - name: Build (staging env, inlined by Infisical)
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging -- pnpm exec opennextjs-cloudflare build

      - name: Upload Cloudflare Workers preview version
        id: upload_preview
        run: |
          OUTPUT=$(infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging -- pnpm exec wrangler versions upload)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -n1)
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Cloudflare Workers Preview

      - name: Comment preview URL on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ### Cloudflare Workers Preview

            ${{ steps.upload_preview.outputs.url }}

            staging Directus (`https://stg-api.aramakisai.com`) 向けビルドです。

  e2e:
    name: e2e (staging preview)
    needs: deploy-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      E2E_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Infisical login
        run: |
          echo "INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)" >> "$GITHUB_ENV"
          echo "INFISICAL_PROJECT_ID=$(python3 -c "import json;print(json.load(open('.infisical.json'))['workspaceId'])")" >> "$GITHUB_ENV"

      - name: Wait for preview to become reachable
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging -- pnpm exec tsx scripts/wait-for-preview.ts

      - name: Run E2E tests
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging -- pnpm test:e2e

      - name: Upload Playwright report (trace/screenshot)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "### e2e (staging preview) failed"
            echo "- preview URL: ${E2E_BASE_URL}"
            echo "- diagnostics: see the \`playwright-report\` artifact attached to this job"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: deploy dev (Workers)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Infisical login
        run: |
          echo "INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)" >> "$GITHUB_ENV"
          echo "INFISICAL_PROJECT_ID=$(python3 -c "import json;print(json.load(open('.infisical.json'))['workspaceId'])")" >> "$GITHUB_ENV"

      - name: Build
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_DIRECTUS_URL: https://api.aramakisai.com
          NEXT_PUBLIC_SITE_URL: https://dev.aramakisai.com
          # dev環境のみ ?home_variant=pre_event|live クエリでのフェーズプレビューを許可する
          # (本番ビルドではこの変数を設定しないため、本番では常に無効)
          NEXT_PUBLIC_ENABLE_HOME_VARIANT_QUERY_OVERRIDE: 'true'

      - name: Deploy to Cloudflare Workers (dev)
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging -- pnpm exec wrangler deploy --env=dev

  deploy-prod:
    name: deploy prod (Workers)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Infisical login
        run: |
          echo "INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)" >> "$GITHUB_ENV"
          echo "INFISICAL_PROJECT_ID=$(python3 -c "import json;print(json.load(open('.infisical.json'))['workspaceId'])")" >> "$GITHUB_ENV"

      - name: Build (prod env, inlined by Infisical)
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=prod -- pnpm exec opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers (prod)
        run: infisical run --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=prod -- pnpm exec opennextjs-cloudflare deploy
