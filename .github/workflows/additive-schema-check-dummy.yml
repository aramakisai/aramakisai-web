name: Additive-only Schema Check (dummy for non-schema PRs)

# main branch protection の required status checks に
# `Detect breaking snapshot.yaml changes` を追加すると、
# additive-schema-check.yml が paths: directus/schema/snapshot.yaml の
# path filter で発火しない PR では永久に "Expected" のまま完了せず、
# enforce_admins: true 適用後は admin でもマージ不能になる
# （frontend-ci-dummy.yml と同一の GitHub 既知の制約）。
# このワークフローは snapshot.yaml を触らない PR でのみ発火し、
# 同名の context を常に成功として報告することでこれを回避する
# (snapshot.yaml を触る PR では additive-schema-check.yml 側の実ジョブが
# このダミーを上書きする形で実際の結果を報告する)。
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect snapshot.yaml changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect directus/schema/snapshot.yaml change
        id: check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qxF 'directus/schema/snapshot.yaml'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Detect breaking snapshot.yaml changes
    needs: detect
    if: needs.detect.outputs.changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Report success (snapshot.yaml not touched)
        run: echo "additive-schema-check.yml does not trigger for this PR; reporting required context as passing."
