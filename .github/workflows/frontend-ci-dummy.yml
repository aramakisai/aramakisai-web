name: Frontend CI (dummy for non-frontend PRs)

# main branch protection の required status checks
# (`type-check / lint / test / build`, `deploy preview (Workers)`) は、
# frontend-ci.yml が paths: frontend/** の path filter で発火しない PR では
# 永久に "Expected" のまま完了せず、enforce_admins: true 適用後は admin でも
# マージ不能になる（GitHub の既知の制約）。
# このワークフローは frontend/** を触らない PR でのみ発火し、
# 同名の context を常に成功として報告することでこれを回避する
# (frontend/** を触る PR では frontend-ci.yml 側の実ジョブがこのダミーを
# 上書きする形で実際の結果を報告する)。
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend/** or frontend-ci.yml change
        id: check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE '^(frontend/|\.github/workflows/frontend-ci\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: type-check / lint / test / build
    needs: detect
    if: needs.detect.outputs.changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Report success (frontend/** not touched)
        run: echo "frontend-ci.yml does not trigger for this PR; reporting required context as passing."

  deploy-preview:
    name: deploy preview (Workers)
    needs: detect
    if: needs.detect.outputs.changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Report success (frontend/** not touched)
        run: echo "frontend-ci.yml does not trigger for this PR; reporting required context as passing."
