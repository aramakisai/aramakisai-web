name: Additive-only Schema Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - directus/schema/snapshot.yaml

permissions:
  contents: read

jobs:
  check:
    name: Detect breaking snapshot.yaml changes
    # 一時停止中 (sitemap-schema-review spec Requirement 5): 本番未公開期間 (custom domain 未接続) に限り、
    # additive-only 制約の機械強制を停止する。job が skipped 扱いとなり required status check は満たされる。
    # 再開条件: 本番公開判断 (custom domain 接続)。再開時はこの if:false 行を削除する PR を作成する。
    # 詳細: .kiro/specs/sitemap-schema-review/design.md の「CI 一時停止の状態遷移」参照。
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect snapshot.yaml change
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qxF 'directus/schema/snapshot.yaml'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract base/head snapshot.yaml content
        if: steps.diff.outputs.changed == 'true'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          rm -f /tmp/base-snapshot.yaml
          if git cat-file -e "${BASE_SHA}:directus/schema/snapshot.yaml" 2>/dev/null; then
            git show "${BASE_SHA}:directus/schema/snapshot.yaml" > /tmp/base-snapshot.yaml
          fi
          git show "${HEAD_SHA}:directus/schema/snapshot.yaml" > /tmp/head-snapshot.yaml

      - name: Setup pnpm
        if: steps.diff.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run additive-only schema check
        if: steps.diff.outputs.changed == 'true'
        working-directory: frontend
        run: pnpm exec tsx scripts/check-additive-schema.ts /tmp/base-snapshot.yaml /tmp/head-snapshot.yaml
