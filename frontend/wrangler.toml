name = "aramakisai-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# 暫定: aramakisai.com は Terraform 管理外の CNAME で旧サイトへ向いたままのため、
# custom domain route はまだバインドしない (infra dns.tf の apex record は
# コメントアウトされたまま、フロントエンド移行完了まで解除しない)。
# workers.dev サブドメインでパイプライン自体の動作確認のみ行う。
workers_dev = true

[assets]
directory = ".open-next/assets"

# dev ブランチ向け永続レビュー環境 (dev.aramakisai.com, CF Access保護)。
# 本番用 worker とは別名にし、`opennextjs-cloudflare deploy --env=dev` /
# `wrangler deploy --env=dev` で本番設定と衝突せずデプロイできるようにする。
# custom domain (dev.aramakisai.com) の紐付けは aramakisai-infra 側 Terraform で管理する。
# (aramakisai-infra側のcloudflare_workers_domainがこのenvironmentの存在を前提とするため、
#  先にこのenvironmentをデプロイしておく必要がある)
[env.dev]
name = "aramakisai-web-dev"

[env.dev.assets]
directory = ".open-next/assets"
